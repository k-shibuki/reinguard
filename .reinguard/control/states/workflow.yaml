# FSM v1 state rules (ADR-0013). Lower priority number wins among matches (ADR-0004).
rules:
  - type: state
    id: rate_limited
    priority: 8
    state_id: bot_rate_limited
    when:
      op: any
      path: github.reviews.bot_reviewer_status
      when:
        and:
          - op: eq
            path: $.required
            value: true
          - op: eq
            path: $.status
            value: rate_limited

  - type: state
    id: review_paused
    priority: 10
    state_id: bot_review_paused
    when:
      op: any
      path: github.reviews.bot_reviewer_status
      when:
        and:
          - op: eq
            path: $.required
            value: true
          - op: eq
            path: $.status
            value: review_paused

  - type: state
    id: review_failed
    priority: 11
    state_id: bot_review_failed
    when:
      op: eq
      path: github.reviews.bot_review_diagnostics.bot_review_failed
      value: true

  - type: state
    id: bot_reviewing
    priority: 12
    state_id: bot_reviewing
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_pending
          value: true

  # Open review threads (GitHub reviewThreads isResolved=false). Distinct from
  # changes_requested, which keys off formal CHANGES_REQUESTED review decisions only.
  - type: state
    id: unresolved_threads
    priority: 14
    state_id: unresolved_threads
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: gt
          path: github.reviews.review_threads_unresolved
          value: 0

  - type: state
    id: changes_requested
    priority: 15
    state_id: changes_requested
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: gt
          path: github.reviews.review_decisions_changes_requested
          value: 0

  - type: state
    id: ready_to_merge
    priority: 25
    state_id: ready_to_merge
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: eq
          path: github.reviews.review_threads_unresolved
          value: 0
        - op: eq
          path: github.reviews.review_decisions_changes_requested
          value: 0
        - op: eq
          path: git.working_tree_clean
          value: true
        - op: eq
          path: github.ci.ci_status
          value: success
        - op: eq
          path: github.pull_requests.merge_state_status
          value: clean

  - type: state
    id: pr_open
    priority: 40
    state_id: pr_open
    when:
      op: eq
      path: github.pull_requests.pr_exists_for_branch
      value: true

  - type: state
    id: working_no_pr
    priority: 60
    state_id: working_no_pr
    when:
      and:
        - op: eq
          path: git.detached_head
          value: false
        - or:
            - op: eq
              path: github.pull_requests.pr_exists_for_branch
              value: false
            - op: not_exists
              path: github.pull_requests.pr_exists_for_branch
