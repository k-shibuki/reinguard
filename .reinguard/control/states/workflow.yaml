# FSM workflow states (ADR-0013). Lower priority number wins among matches (ADR-0004).
# Human-addressable review (threads / non-thread findings / formal changes) still has
# the lowest numeric priorities (8–10), but predicates exclude bot-wait recovery:
# `when` requires bot diagnostics to not indicate blocked / failed / stale / pending
# (Issue #129). Bot-wait states split by reason (state_id); CI/merge gate split as waiting_ci.
schema_version: "0.8.0"
rules:
  # Human-actionable review work first (before any bot-wait tier).
  - type: state
    id: unresolved_threads
    priority: 8
    state_id: unresolved_threads
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: gt
          path: github.reviews.review_threads_unresolved
          value: 0
        - &id_bot_diagnostics_not_blocking
          or:
            - op: not_exists
              path: github.reviews.bot_review_diagnostics.bot_review_blocked
            - op: eq
              path: github.reviews.bot_review_diagnostics.bot_review_blocked
              value: false
        - &id_bot_diagnostics_not_failed
          or:
            - op: not_exists
              path: github.reviews.bot_review_diagnostics.bot_review_failed
            - op: eq
              path: github.reviews.bot_review_diagnostics.bot_review_failed
              value: false
        - &id_bot_diagnostics_not_stale
          or:
            - op: not_exists
              path: github.reviews.bot_review_diagnostics.bot_review_stale
            - op: eq
              path: github.reviews.bot_review_diagnostics.bot_review_stale
              value: false
        - &id_bot_diagnostics_not_pending
          or:
            - op: not_exists
              path: github.reviews.bot_review_diagnostics.bot_review_pending
            - op: eq
              path: github.reviews.bot_review_diagnostics.bot_review_pending
              value: false

  - type: state
    id: non_thread_findings_pending
    priority: 9
    state_id: non_thread_findings_pending
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: eq
          path: github.reviews.review_threads_unresolved
          value: 0
        - op: eq
          path: github.reviews.pagination_incomplete
          value: false
        - op: eq
          path: github.reviews.review_decisions_changes_requested
          value: 0
        - op: eq
          path: github.reviews.bot_review_diagnostics.non_thread_findings_present
          value: true
        - *id_bot_diagnostics_not_blocking
        - *id_bot_diagnostics_not_failed
        - *id_bot_diagnostics_not_stale
        - *id_bot_diagnostics_not_pending

  - type: state
    id: changes_requested
    priority: 10
    state_id: changes_requested
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: gt
          path: github.reviews.review_decisions_changes_requested
          value: 0
        - *id_bot_diagnostics_not_blocking
        - *id_bot_diagnostics_not_failed
        - *id_bot_diagnostics_not_stale
        - *id_bot_diagnostics_not_pending

  - type: state
    id: rate_limited
    priority: 11
    state_id: waiting_bot_rate_limited
    when:
      op: any
      path: github.reviews.bot_reviewer_status
      when:
        and:
          - op: eq
            path: $.required
            value: true
          - op: eq
            path: $.status
            value: rate_limited

  - type: state
    id: review_paused
    priority: 12
    state_id: waiting_bot_paused
    when:
      op: any
      path: github.reviews.bot_reviewer_status
      when:
        and:
          - op: eq
            path: $.required
            value: true
          - op: eq
            path: $.status
            value: review_paused

  - type: state
    id: review_failed
    priority: 13
    state_id: waiting_bot_failed
    when:
      op: eq
      path: github.reviews.bot_review_diagnostics.bot_review_failed
      value: true

  - type: state
    id: bot_stale
    priority: 14
    state_id: waiting_bot_stale
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_stale
          value: true

  - type: state
    id: bot_run
    priority: 15
    state_id: waiting_bot_run
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_pending
          value: true

  # Coarse merge gate (clean tree, CI, threads, decisions). Aligns with merge-readiness guard signals.
  - type: state
    id: merge_ready
    priority: 25
    state_id: merge_ready
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: eq
          path: github.reviews.review_threads_unresolved
          value: 0
        - op: eq
          path: github.reviews.pagination_incomplete
          value: false
        - op: eq
          path: github.reviews.review_decisions_changes_requested
          value: 0
        - op: eq
          path: github.reviews.review_decisions_truncated
          value: false
        - op: eq
          path: git.working_tree_clean
          value: true
        - op: eq
          path: github.ci.ci_status
          value: success
        - op: eq
          path: github.pull_requests.merge_state_status
          value: clean
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_pending
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_blocked
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_terminal
          value: true
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_failed
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_stale
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.non_thread_findings_present
          value: false

  # No open review decisions/threads, clean tree, but CI or mergeability not yet satisfied.
  - type: state
    id: waiting_ci
    priority: 35
    state_id: waiting_ci
    when:
      and:
        - op: eq
          path: github.pull_requests.pr_exists_for_branch
          value: true
        - op: eq
          path: github.reviews.review_threads_unresolved
          value: 0
        - op: eq
          path: github.reviews.pagination_incomplete
          value: false
        - op: eq
          path: github.reviews.review_decisions_changes_requested
          value: 0
        - op: eq
          path: github.reviews.review_decisions_truncated
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_pending
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_blocked
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_failed
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.bot_review_stale
          value: false
        - op: eq
          path: github.reviews.bot_review_diagnostics.non_thread_findings_present
          value: false
        - op: eq
          path: git.working_tree_clean
          value: true
        - or:
            - op: ne
              path: github.ci.ci_status
              value: success
            - op: ne
              path: github.pull_requests.merge_state_status
              value: clean

  - type: state
    id: pr_open
    priority: 40
    state_id: pr_open
    when:
      op: eq
      path: github.pull_requests.pr_exists_for_branch
      value: true

  - type: state
    id: ready_for_pr
    priority: 55
    state_id: ready_for_pr
    when:
      and:
        - op: eq
          path: git.detached_head
          value: false
        - or:
            - op: eq
              path: github.pull_requests.pr_exists_for_branch
              value: false
            - op: not_exists
              path: github.pull_requests.pr_exists_for_branch
        - op: eq
          path: gates.pr-readiness.status
          value: pass

  - type: state
    id: working_no_pr
    priority: 60
    state_id: working_no_pr
    when:
      and:
        - op: eq
          path: git.detached_head
          value: false
        - or:
            - op: eq
              path: github.pull_requests.pr_exists_for_branch
              value: false
            - op: not_exists
              path: github.pull_requests.pr_exists_for_branch
