# Control catalog — human-maintained index of files under control/.
# Not read by config.Load or `rgd config validate` today (those load
# reinguard.yaml and control/{states,routes,guards}/*.yaml only).
# Maintained manually; future `rgd` may auto-generate or validate this catalog.
schema_version: "0.6.0"
entries:
  - id: workflow-states
    path: states/workflow.yaml
    type: state
    description: "FSM v1 workflow states (ADR-0013)"
  - id: workflow-routes
    path: routes/workflow.yaml
    type: route
    description: "FSM v1 routes keyed on state.state_id (ADR-0013)"
  - id: merge-readiness-guard
    path: guards/default.yaml
    type: guard
    description: "Declarative gate for merge-readiness built-in when branch is attached"
