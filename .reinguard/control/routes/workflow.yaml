# Routes keyed off flattened state.state_id (ADR-0013). One primary route per state for v1.
# route_id uses the user-* prefix (Adapter-agnostic; not tied to a specific IDE).
rules:
  - type: route
    id: route_implement
    priority: 20
    route_id: user-implement
    when:
      op: eq
      path: state.state_id
      value: working_no_pr

  - type: route
    id: route_monitor
    priority: 21
    route_id: user-monitor-pr
    when:
      op: eq
      path: state.state_id
      value: pr_open

  - type: route
    id: route_address_review
    priority: 22
    route_id: user-address-review
    when:
      or:
        - op: eq
          path: state.state_id
          value: unresolved_threads
        - op: eq
          path: state.state_id
          value: changes_requested

  - type: route
    id: route_wait_bot_fail
    priority: 23
    route_id: user-wait-bot
    when:
      op: eq
      path: state.state_id
      value: bot_review_failed

  - type: route
    id: route_wait_bot_reviewing
    priority: 24
    route_id: user-wait-bot
    when:
      op: eq
      path: state.state_id
      value: bot_reviewing

  - type: route
    id: route_wait_bot_rl
    priority: 25
    route_id: user-wait-bot
    when:
      op: eq
      path: state.state_id
      value: bot_rate_limited

  - type: route
    id: route_wait_bot_pause
    priority: 26
    route_id: user-wait-bot
    when:
      op: eq
      path: state.state_id
      value: bot_review_paused

  - type: route
    id: route_merge
    priority: 27
    route_id: user-merge
    when:
      op: eq
      path: state.state_id
      value: ready_to_merge
