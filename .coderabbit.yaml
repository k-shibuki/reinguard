# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit — primary bot reviewer.
#
# Auto-review: CodeRabbit offers free reviews for public OSS repos (see
# https://www.coderabbit.ai/oss ). Automatic PR review is a normal product
# feature; docs default is auto_review.enabled: true. This repo enables it
# so every PR to the default branch is reviewed without relying only on
# @coderabbitai review. Agents may still comment @coderabbitai review for
# an extra pass after pushes. Override or pause anytime in the CodeRabbit UI
# if org policy differs.
#
# Docstrings: finishing touches can suggest or open follow-up work; repository
# SSOT for godoc meaning and merge gates is `.reinguard/policy/coding--godoc.md`
# and CI `golangci-lint` / `revive`. Do not treat generated docstrings as
# authoritative without human review (see path_instructions).

language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false
  in_progress_fortune: false
  review_status: true
  commit_status: true
  review_details: true
  collapse_walkthrough: true
  changed_files_summary: false
  sequence_diagrams: false
  estimate_code_review_effort: false
  enable_prompt_for_ai_agents: false
  related_issues: true
  related_prs: false
  suggested_labels: false
  auto_apply_labels: false
  suggested_reviewers: false
  auto_assign_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
    # Skip dependency and CI bots (exact GitHub usernames; see CodeRabbit docs).
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
      - "github-actions[bot]"
  finishing_touches:
    # Optional assist only: follow-up PRs or suggestions must be reviewed for
    # semantic accuracy; mechanical or filler comments are forbidden per policy.
    docstrings:
      enabled: true
    unit_tests:
      enabled: false
  path_instructions:
    - path: ".reinguard/**"
      instructions: |
        Semantics layer (ADR-0001, ADR-0010, ADR-0011): policy, knowledge, control rules, and
        `reinguard.yaml` consumed by `rgd`. Flag contradictions between `policy/catalog.yaml` or
        `knowledge/manifest.json` and files on disk; broken YAML that fails `rgd config validate`.
        Prose is English; stable front-matter `id` values. Code examples must match current `rgd` and
        Go APIs (spec-based providers). After knowledge front-matter edits, `rgd knowledge index` and
        commit `manifest.json`.
    - path: ".cursor/**"
      instructions: |
        Adapter (Cursor) per ADR-0001: bridge rule (`reinguard-bridge.mdc`) and commands under
        `.cursor/commands/`. Must point at `.reinguard/` and substrate CLI — do not duplicate long
        normative policy bodies that belong only under `.reinguard/`.
    - path: "AGENTS.md"
      instructions: |
        Top-level agent orientation; mirror catalog entry points (`policy/catalog.yaml`, knowledge
        `manifest.json`) and ADR pointers — not replace `.reinguard/` bodies.
    - path: "cmd/**"
      instructions: |
        `rgd` CLI entrypoints and flags. Align with `docs/cli.md` and ADRs; substrate must not embed
        workflow-brain semantics (ADR-0001). New behavior needs tests where non-trivial.
    - path: "internal/**"
      instructions: |
        Non-public `rgd` implementation. Observation and GitHub: ADR-0005 (no agent-internal paths),
        ADR-0006 (`gh` for GitHub auth). Prefer table-driven tests; non-trivial tests follow
        `.reinguard/knowledge/testing--*.md` (GWT where required).
    - path: "pkg/**"
      instructions: |
        Library-facing code and stable-ish APIs. Breaking changes need traceability (ADR, migration).
        JSON/schema must match embedded contracts (ADR-0008). Exported behavior should have tests.
    - path: "docs/adr/**"
      instructions: |
        ADRs are normative. Flag drift where code or `.reinguard/` contradicts an accepted ADR without
        a superseding ADR.
    - path: ".github/workflows/**"
      instructions: |
        Job `ci-pass` is the aggregate required check for branch protection. PR policy runs in
        `gate-policy` (`.github/scripts/pr-policy-check.js`). Keep permissions minimal;
        align with `.github/CONTRIBUTING.md`.
  tools:
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
    markdownlint:
      enabled: true
    github-checks:
      enabled: true

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
