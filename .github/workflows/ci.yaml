name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: "1.26.1"

      - name: Download modules
        run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Warm module cache
        run: go build ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

      - name: go build
        run: go build -o /tmp/rgd ./cmd/rgd

      - name: Smoke CLI
        run: |
          /tmp/rgd version
          /tmp/rgd config validate
          /tmp/rgd schema export --dir /tmp/rgd-schema-smoke
