name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: "1.26.1"

      - name: Download modules
        run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: Warm module cache
        run: go build ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: v2.11.4
          args: --timeout=5m ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -coverprofile=coverage.out

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore

      - name: go build
        run: go build -o /tmp/rgd ./cmd/rgd

      - name: Smoke CLI
        run: |
          /tmp/rgd version
          /tmp/rgd config validate
          /tmp/rgd schema export --dir /tmp/rgd-schema-smoke

  check-policy:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/pr-policy.yaml
    secrets: inherit

  # Single required check for branch protection (include policy on PRs).
  ci-pass:
    if: always()
    needs: [go-ci, check-policy]
    runs-on: ubuntu-latest
    steps:
      - name: Verify aggregate gate
        env:
          GO_RESULT: ${{ needs.go-ci.result }}
          POLICY_RESULT: ${{ needs.check-policy.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$GO_RESULT" != "success" ]; then
            echo "go-ci did not succeed: $GO_RESULT"
            exit 1
          fi
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$POLICY_RESULT" != "success" ]; then
              echo "check-policy did not succeed: $POLICY_RESULT"
              exit 1
            fi
          fi
          echo "ci-pass: OK"
