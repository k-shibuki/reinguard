name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Download modules
        run: go mod download

      - name: Verify module checksums
        run: go mod verify

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.62.0
          args: --timeout=5m

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -race -coverprofile=coverage.out

      - name: go build
        run: go build -o /tmp/rgd ./cmd/rgd

      - name: Smoke CLI
        run: |
          /tmp/rgd version
          /tmp/rgd config validate
          /tmp/rgd schema export --dir /tmp/rgd-schema-smoke
