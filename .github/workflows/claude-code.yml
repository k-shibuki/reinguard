# Manual @claude only: PR/Issue conversation comments and inline review comments.
# We intentionally omit `pull_request_review` — it fires on every review submit, which
# retriggers Actions and can show approval/skip noise when @claude is not present.
#
# Requires GitHub App https://github.com/apps/claude
# Claude Pro / Max: `claude setup-token` → secret CLAUDE_CODE_OAUTH_TOKEN. API billing: ANTHROPIC_API_KEY.
# See https://github.com/anthropics/claude-code-action/blob/main/docs/setup.md

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      ) ||
      (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
