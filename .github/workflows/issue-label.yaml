# Safety net: optional auto-label from Task Issue Form "### Type" + informational comments.
# Does not close Issues. See `.reinguard/scripts/check-issue-policy.sh` for local pre-flight.
name: Issue — label sync

on:
  issues:
    types: [opened, edited, labeled, unlabeled]

permissions:
  issues: write
  contents: read

jobs:
  issue-label-sync:
    name: Issue label sync (comment-only)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mikefarah yq
        run: |
          set -euo pipefail
          YQ_VER=4.45.1
          curl -sSL "https://github.com/mikefarah/yq/releases/download/v${YQ_VER}/yq_linux_amd64" -o /tmp/yq
          sudo install -m 0755 /tmp/yq /usr/local/bin/yq
          yq --version

      - name: Extract label config
        run: yq -o json .reinguard/labels.yaml > /tmp/labels.json

      - name: Run issue-label-sync.js
        uses: actions/github-script@v8
        env:
          LABELS_POLICY_JSON: /tmp/labels.json
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const p = path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/issue-label-sync.js');
            const code = fs.readFileSync(p, 'utf8');
            const AsyncFunction = Object.getPrototypeOf(async function () {}).constructor;
            const fn = new AsyncFunction('github', 'context', 'core', code);
            return await fn(github, context, core);
