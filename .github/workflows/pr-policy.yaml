# Reusable PR policy gate: Issue linkage, required sections, labels, base branch.
# Logic lives in `.github/scripts/pr-policy-check.js` (also run from `gate-policy` in ci.yaml).
# Exception contract: workflow-policy.mdc.
on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  check-policy:
    name: Gate — PR policy (reusable)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install mikefarah yq
        env:
          YQ_VER: "4.45.1"
        run: bash .github/scripts/install-mikefarah-yq.sh

      - name: Extract label config for PR policy
        run: yq -o json .reinguard/labels.yaml > /tmp/labels.json

      - name: Check PR policy compliance
        uses: actions/github-script@v8
        env:
          LABELS_POLICY_JSON: /tmp/labels.json
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const p = path.join(process.env.GITHUB_WORKSPACE, '.github/scripts/pr-policy-check.js');
            const code = fs.readFileSync(p, 'utf8');
            const AsyncFunction = Object.getPrototypeOf(async function () {}).constructor;
            const fn = new AsyncFunction('github', 'context', 'core', 'require', code);
            return await fn(github, context, core, require);
